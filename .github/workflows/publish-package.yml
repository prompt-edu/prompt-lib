name: Publish Package to npmjs

on:
  release:
    types: [published]

permissions:
  contents: read

env:
  NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract_version.outputs.VERSION }}
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Extract version from release tag
        id: extract_version
        run: |
          # Extract version from release tag (e.g., v1.2.3 -> 1.2.3)
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          VERSION="${RELEASE_TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Validate prompt-ui-components version matches release tag
        run: |
          RELEASE_VERSION="${{ steps.extract_version.outputs.VERSION }}"
          
          # Check package version
          PACKAGE_VERSION=$(node -p "require('./prompt-ui-components/package.json').version")
          if [ "$PACKAGE_VERSION" != "$RELEASE_VERSION" ]; then
            echo "❌ ERROR: Version mismatch in prompt-ui-components!"
            echo "   Release tag version: $RELEASE_VERSION"
            echo "   Package.json version: $PACKAGE_VERSION"
            echo ""
            echo "Please update the version in prompt-ui-components/package.json to match the release tag."
            echo "Expected: \"version\": \"$RELEASE_VERSION\""
            exit 1
          fi
          
          echo "✅ prompt-ui-components version matches release tag: $RELEASE_VERSION"

  publish:
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prompt-ui-components

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '23.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Enable Corepack
        run: corepack enable

      - name: Configure npm authentication
        run: |
          yarn config set npmAuthToken $NPM_AUTH_TOKEN
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: Install dependencies
        run: yarn install

      - name: Build package
        run: yarn build

      - name: Publish @tumaet/prompt-ui-components to npm
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
        run: |
          echo "Publishing @tumaet/prompt-ui-components to npm..."
          yarn npm publish
